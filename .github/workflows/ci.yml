name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: ['**']

permissions: {}

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
        with:
          # Use the MIT-licensed basic caching provider instead of the
          # default enhanced caching, which is proprietary.
          cache-provider: basic

      - name: Build SDK
        run: ./gradlew :device-sdk:build

      - name: Run tests
        run: ./gradlew :device-sdk:test

      - name: Run linting
        run: ./gradlew detekt ktlintCheck

      - name: Build sample app
        run: ./gradlew :sample:assembleDebug

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: always()
        with:
          name: test-results
          path: device-sdk/build/reports/tests/
