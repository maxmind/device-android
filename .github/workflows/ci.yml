name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: ['**']

permissions: {}

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          # Use the MIT-licensed basic caching provider instead of the
          # default enhanced caching, which is proprietary.
          cache-provider: basic

      - name: Build SDK
        run: ./gradlew :device-sdk:build

      - name: Run tests
        run: ./gradlew :device-sdk:test

      - name: Run linting
        run: ./gradlew detekt ktlintCheck

      - name: Build sample app
        run: ./gradlew :sample:assembleDebug

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: test-results
          path: device-sdk/build/reports/tests/
